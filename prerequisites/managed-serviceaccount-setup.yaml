# Apply this ONCE per managed cluster on the Hub.
# Replace MANAGED_CLUSTER_NAME with the actual managed cluster namespace (e.g., sno-2-xsr74).
#
# Step 1: Enable the managed-serviceaccount add-on
# Step 2: Create a ManagedServiceAccount for ArgoCD
# Step 3: Grant cluster-admin permissions via ClusterPermission
#
# After applying, the GitOpsCluster (in child-appset/gitopscluster.yaml) references
# this service account via managedServiceAccountRef: argocd-manager

# Step 1: Enable managed-serviceaccount add-on on the managed cluster
apiVersion: addon.open-cluster-management.io/v1alpha1
kind: ManagedClusterAddOn
metadata:
  name: managed-serviceaccount
  namespace: MANAGED_CLUSTER_NAME
spec:
  installNamespace: open-cluster-management-agent-addon
---
# Step 2: Create a dedicated service account for ArgoCD on the managed cluster
apiVersion: authentication.open-cluster-management.io/v1alpha1
kind: ManagedServiceAccount
metadata:
  name: argocd-manager
  namespace: MANAGED_CLUSTER_NAME
spec:
  rotation: {}
---
# Step 3: Grant the service account cluster-admin on the managed cluster
# This allows ArgoCD to create VirtualMachines and all other resources.
# For least-privilege, replace cluster-admin with a custom ClusterRole.
apiVersion: rbac.open-cluster-management.io/v1alpha1
kind: ClusterPermission
metadata:
  name: argocd-manager-permission
  namespace: MANAGED_CLUSTER_NAME
spec:
  clusterRoleBindings:
    - clusterRoleName: cluster-admin
      subject:
        kind: ServiceAccount
        name: argocd-manager
        namespace: open-cluster-management-managed-serviceaccount
